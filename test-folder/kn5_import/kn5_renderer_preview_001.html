<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="utf-8">
	<title>kn5 analyze (Local Upload Ver)</title>
	
	<style>
		body,html {
			width:100%;
			height:100%;
			padding:0;
			margin:0;
			position:relative;
		}
		body {
			font-family: Monospace;
			background-color: #fff;
			margin: 0px;
			overflow: hidden;
			position:relative;
		}
		#info {
			color: #000;
			padding:20px;
			position: absolute;
			bottom: 0;
			right:0;
			text-align: right;
			z-index: 100;
			display:block;
		}
		#msg {
			display:block;
			width:300px;
			height:100%;
			overflow:hidden;
			position:absolute;
			top:0;
			left:0;
			bottom:0;
			z-index:30;
			background: rgba(0,0,0,0.5);
			padding: 10px;
		}
		#status-message {
			display:block;
			width:100%;
			height:80%;
			padding:5px 15px;
			overflow-y:auto;
			box-sizing: border-box;
			background-color:transparent;
			font-size:10px;
			color:#ccc;
			margin-top: 10px;
		}
		#gl-container {
			width:100%;
			height:100%;
			overflow:hidden;
			position:absolute;
			top:0;
			left:0;
			z-index:10;
		}
		#loading-state {
			margin	: -25px 0 0 -150px;
			width	: 300px;
			height	: 50px;
			position: absolute;
			top		: 50%;
			left	: 50%;
			z-index	: 20;
			display: none;
		}
		#loading-state .status {
			width	: 100%;
			height	: 25px;
			line-height:25px;
			font-weight: bold;
			text-align:center;
			font-size: 12px;
			text-transform: uppercase;
			color: #fff;
		}
		#loading-state .progressbar {
			width	: 100%;
			height	: 25px;
			background-color: #eee;
			position: relative;
		}
		#loading-state .progressbar .bar {
			width	: 0%;
			height	: 100%;
			position: absolute;
			top		: 0;
			left	: 0;
			background-color: #ccc;
			z-index : 1;
			transition: width .2s;
		}
		#loading-state .progressbar .percentage {
			width	: 100%;
			height	: 100%;
			line-height: 25px;
			text-align: center;
			font-size: 12px;
			color	: #333;
			position:absolute;
			top:0;
			left:0;
			z-index : 2;
		}
		#file-selector {
			color: white;
			margin-bottom: 10px;
		}
	</style>
	
	<script src="./DataStream.js"></script>
	<script src="./jquery.js"></script>
	<script src="./three.js"></script>
	<script src="./OrbitControls.js"></script>
	<script src="./DDSLoader.js"></script>
	<script src="./KN5Loader.old.js"></script>
	<script src="./Detector.js"></script>
	<script src="./stats.min.js"></script>

	<script>
		$(function(){

			if ( ! Detector.webgl ) Detector.addGetWebGLMessage();

			var container, stats;
			var envMapCube = null;
			var camera, scene, renderer;
			var currentModel = null;

			init();
			animate();

			function init() {

				container = document.createElement( 'div' );
				container.id = "gl-container";
				document.body.appendChild( container );

				camera = new THREE.PerspectiveCamera( 40, window.innerWidth / window.innerHeight, 1, 2000 );
				camera.position.set(40,15,26);
				
				scene = new THREE.Scene();
				scene.add( new THREE.AmbientLight( 0x777777 ) ); // 少し明るめに調整
				
				var light = new THREE.SpotLight( 0xfffaf6, 1.6, 3000, Math.PI / 2, 0.5 );
				light.position.set( 45, 80, 30 );
				scene.add( light );

				var floorGeometry = new THREE.PlaneGeometry( 200, 200, 1, 1 );
				var floorMaterial = new THREE.MeshBasicMaterial({ color: 0x333333 });
				var floor = new THREE.Mesh( floorGeometry, floorMaterial);
				floor.rotation.x = -90 * (Math.PI / 180);
				floor.position.set(0,-0.6,0);
				scene.add( floor );
				
				var pb = $("#loading-state");
				var msg = $("#status-message");
				
				var onProgress = function ( e ) {
					var per = ((e.loaded && e.total > 0 || e.lengthComputable) ? Math.floor(e.loaded / e.total * 100) : 100);
					pb.children(".progressbar")
						.children(".bar").css({width: (per + '%')}).end()
						.children(".percentage").text(per + '%');
					if(e.status) {
						pb.children(".status").text(e.status);
					}
					if(e.message) {
						msg.append(e.message + "\n");
						msg.scrollTop(msg[0].scrollHeight - msg.height());
					}
				};

				var onError = function ( e ) {
					console.warn(e.message);
					pb.hide();
					alert("パースエラーが発生しました。暗号化Modの可能性があります。");
				};

				// ファイル選択時の処理
				$("#kn5-file").on("change", function(event) {
					var file = event.target.files[0];
					if (!file) return;

					if (currentModel) {
						scene.remove(currentModel);
					}

					msg.text("ファイルを読み込み中...\n");
					pb.show();

					var reader = new FileReader();
					reader.onload = function(e) {
						var arrayBuffer = e.target.result;
						var loader = new THREE.KN5Loader();
						THREE.Loader.Handlers.add( /\.dds$/i, new THREE.DDSLoader() );

						try {
							var ret = loader.parse(arrayBuffer, onProgress);
							if (!ret) {
								alert("KN5ファイルの解析に失敗しました。");
								pb.hide();
								return;
							}

							var object = ret[0];
							object.scale.set(10, 10, 10);

							object.traverse(function (node) {
								if (node instanceof THREE.Mesh) {
									if(node.name.search(/blur|damage|cockpit_lr|steer_lr/i) >= 0) {
										node.visible = false;
									}
									if(node.name.search(/window|glass/i) >= 0 || node.material.name.search(/window|glass/i) >= 0) {
										node.material.transparent = true;
										node.material.opacity = 0.4;
									}
								}
							});

							scene.add(object);
							currentModel = object;

							controls.target.set(0, 0, 0);
							controls.update();

							pb.delay(500).fadeOut(500);
							msg.append("\n【読み込み完了！】");

						} catch (err) {
							console.error(err);
							alert("エラーが発生しました: " + err.message);
							pb.hide();
						}
					};

					reader.readAsArrayBuffer(file);
				});
				
				renderer = new THREE.WebGLRenderer({alpha: true, antialias: true});
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				renderer.setClearColor(0x222222, 1);
				
				container.appendChild( renderer.domElement );

				var controls = new THREE.OrbitControls( camera, renderer.domElement );
				controls.addEventListener( 'change', render );
				controls.target.set( 0, 0, 0 );
				controls.update();
				
				window.addEventListener( 'resize', onWindowResize, false );
			}

			function onWindowResize() {
				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();
				renderer.setSize( window.innerWidth, window.innerHeight );
			}

			function animate() {
				requestAnimationFrame( animate );
				render();
			}

			function render() {
				renderer.render( scene, camera );
			}
		});
	</script>
</head>
<body>
<div id="info">自作 KN5 ローカルビューア (Three.js r73ベース)</div>
<div id="msg">
	<div id="file-selector">
		<label for="kn5-file">▼ KN5ファイルを選択</label><br>
		<input type="file" id="kn5-file" accept=".kn5">
	</div>
	<textarea id="status-message" disabled="disabled"></textarea>
</div>
<div id="loading-state">
	<p class="status"></p>
	<div class="progressbar"><span class="bar"></span><span class="percentage"></span></div>
</div>

</body>
</html>
