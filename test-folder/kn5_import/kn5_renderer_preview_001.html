<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="utf-8">
	<title>kn5 analyze (Local Upload Ver)</title>
	
	<style>
		body,html {
			width:100%;
			height:100%;
			padding:0;
			margin:0;
			position:relative;
		}
		body {
			font-family: Monospace;
			background-color: #fff;
			margin: 0px;
			overflow: hidden;
			position:relative;
		}
		#info {
			color: #000;
			padding:20px;
			position: absolute;
			bottom: 0;
			right:0;
			text-align: right;
			z-index: 100;
			display:block;
		}
		#msg {
			display:block;
			width:300px;
			height:100%;
			overflow:hidden;
			position:absolute;
			top:0;
			left:0;
			bottom:0;
			z-index:30;
			background: rgba(0,0,0,0.5);
			padding: 10px;
		}
		#status-message {
			display:block;
			width:100%;
			height:80%;
			padding:5px 15px;
			overflow-y:auto;
			box-sizing: border-box;
			background-color:transparent;
			font-size:10px;
			color:#ccc;
			margin-top: 10px;
		}
		#gl-container {
			width:100%;
			height:100%;
			overflow:hidden;
			position:absolute;
			top:0;
			left:0;
			z-index:10;
		}
		#loading-state {
			margin	: -25px 0 0 -150px;
			width	: 300px;
			height	: 50px;
			position: absolute;
			top		: 50%;
			left	: 50%;
			z-index	: 20;
			display: none;
		}
		#loading-state .status {
			width	: 100%;
			height	: 25px;
			line-height:25px;
			font-weight: bold;
			text-align:center;
			font-size: 12px;
			text-transform: uppercase;
			color: #fff;
		}
		#loading-state .progressbar {
			width	: 100%;
			height	: 25px;
			background-color: #eee;
			position: relative;
		}
		#loading-state .progressbar .bar {
			width	: 0%;
			height	: 100%;
			position: absolute;
			top		: 0;
			left	: 0;
			background-color: #ccc;
			z-index : 1;
			transition: width .2s;
		}
		#loading-state .progressbar .percentage {
			width	: 100%;
			height	: 100%;
			line-height: 25px;
			text-align: center;
			font-size: 12px;
			color	: #333;
			position:absolute;
			top:0;
			left:0;
			z-index : 2;
		}
		#file-selector {
			color: white;
			margin-bottom: 10px;
		}
		#ui-container {
      margin-top: 10px;
      color: white;
      font-size: 12px;
    }
    #ui-container select {
      width: 100%;
      margin-bottom: 5px;
      background: #333;
      color: white;
    }
	</style>
	
	<script src="./DataStream.js"></script>
	<script src="./jquery.js"></script>
	<script src="./three.js"></script>
	<script src="./OrbitControls.js"></script>
	<script src="./DDSLoader.js"></script>
	<script src="./KN5Loader.old.js"></script>
	<script src="./Detector.js"></script>
	<script src="./stats.min.js"></script>
<script src="./FBXExporter.js"></script>
	<script>
		$(function(){

			if ( ! Detector.webgl ) Detector.addGetWebGLMessage();
			function disposeNode(node) {
			if (node.geometry) node.geometry.dispose();
			if (node.material) {
				if (Array.isArray(node.material)) node.material.forEach(m => m.dispose());
				else node.material.dispose();
			}
		}

			var container, stats;
			var envMapCube = null;
			var camera, scene, renderer;
			var currentModel = null;

			init();
      render();

			function init() {

				container = document.createElement( 'div' );
				container.id = "gl-container";
				document.body.appendChild( container );

				camera = new THREE.PerspectiveCamera( 40, window.innerWidth / window.innerHeight, 1, 2000 );
				camera.position.set(40,15,26);
				
				scene = new THREE.Scene();
				scene.add( new THREE.AmbientLight( 0x777777 ) ); // 少し明るめに調整
				
				var light = new THREE.SpotLight( 0xfffaf6, 1.6, 3000, Math.PI / 2, 0.5 );
				light.position.set( 45, 80, 30 );
				scene.add( light );

				var floorGeometry = new THREE.PlaneGeometry( 200, 200, 1, 1 );
				var floorMaterial = new THREE.MeshBasicMaterial({ color: 0x333333 });
				var floor = new THREE.Mesh( floorGeometry, floorMaterial);
				floor.rotation.x = -90 * (Math.PI / 180);
				floor.position.set(0,-0.6,0);
				scene.add( floor );
				
				var pb = $("#loading-state");
				var msg = $("#status-message");
				
				var onProgress = function ( e ) {
					var per = ((e.loaded && e.total > 0 || e.lengthComputable) ? Math.floor(e.loaded / e.total * 100) : 100);
					pb.children(".progressbar")
						.children(".bar").css({width: (per + '%')}).end()
						.children(".percentage").text(per + '%');
					if(e.status) {
						pb.children(".status").text(e.status);
					}
					if(e.message) {
						msg.append(e.message + "\n");
						msg.scrollTop(msg[0].scrollHeight - msg.height());
					}
				};

				var onError = function ( e ) {
					console.warn(e.message);
					pb.hide();
					alert("パースエラーが発生しました。暗号化Modの可能性があります。");
				};

        // ファイル選択時の処理
        $("#kn5-file").on("change", function(event) {
          var files = event.target.files;
          var file = null;
          window.skinFolders = {}; // フォルダ管理用の箱

          for (var i = 0; i < files.length; i++) {
            var f = files[i];
            var fileName = f.name.toLowerCase();
            if (fileName.endsWith(".kn5") && fileName !== "collider.kn5") {
              file = f;
            } else if (f.webkitRelativePath.includes("/skins/") && fileName.endsWith(".dds")) {
              // skins/サブフォルダ名/ファイル名 を抽出
              var pathParts = f.webkitRelativePath.split('/');
              var skinsIndex = pathParts.indexOf('skins');
              var folderName = pathParts[skinsIndex + 1];
              
              if (!window.skinFolders[folderName]) window.skinFolders[folderName] = {};
              window.skinFolders[folderName][fileName] = f;
            }
          }
          if (!file) {
            alert("フォルダ内にKN5ファイルが見つかりません。");
            return;
          }

          if (currentModel) {
						currentModel.traverse(n => {
							if (n instanceof THREE.Mesh) disposeNode(n);
						});
						scene.remove(currentModel);
					}

					msg.text("ファイルを読み込み中...\n");
					pb.show();

					var reader = new FileReader();
					reader.onload = function(e) {
						var arrayBuffer = e.target.result;
						var loader = new THREE.KN5Loader();
						THREE.Loader.Handlers.add( /\.dds$/i, new THREE.DDSLoader() );

						try {
							var ret = loader.parse(arrayBuffer, onProgress);
							if (!ret) {
								alert("KN5ファイルの解析に失敗しました。");
								pb.hide();
								return;
							}

							var object = ret[0];
              object.scale.set(10, 10, 10);

              object.traverse(function (node) {
                if (node instanceof THREE.Mesh) {
                  console.log("Mesh Name:", node.name, "Material Name:", Array.isArray(node.material) ? node.material.map(m => m.name).join(", ") : node.material.name);
                  if(node.name.search(/blur|damage|cockpit_lr|steer_lr/i) >= 0) {
                    node.visible = false;
                  }
                  if(node.name.search(/window|glass/i) >= 0 || node.material.name.search(/window|glass/i) >= 0) {
                    node.material.transparent = true;
                    node.material.opacity = 0.4;
                  }
                }
              });

              scene.add(object);
              currentModel = object;

							controls.target.set(0, 0, 0);
							controls.update();

							pb.delay(500).fadeOut(500);
							msg.append("\n【読み込み完了！】");
              render();
							setupUI(object);

						} catch (err) {
							console.error(err);
							alert("エラーが発生しました: " + err.message);
							pb.hide();
						}
					};

					reader.readAsArrayBuffer(file);
				});
				
				renderer = new THREE.WebGLRenderer({alpha: true, antialias: true});
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				renderer.setClearColor(0x222222, 1);
				
				container.appendChild( renderer.domElement );

				var controls = new THREE.OrbitControls( camera, renderer.domElement );
				controls.addEventListener( 'change', render );
				controls.target.set( 0, 0, 0 );
				controls.update();
				
				window.addEventListener( 'resize', onWindowResize, false );
			}

			function onWindowResize() {
				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();
				renderer.setSize( window.innerWidth, window.innerHeight );
				render();
			}

			function render() {
				renderer.render( scene, camera );
			}
			function setupUI(model) {
        var ui = $("#ui-container");
        ui.empty();

        ui.append("<div>スキンの選択:</div>");
        var folderSelect = $('<select id="folder-select"></select>');
        Object.keys(window.skinFolders).forEach(name => {
          folderSelect.append(`<option value="${name}">${name}</option>`);
        });
        ui.append(folderSelect);

        var btn = $('<button>一括適用</button>');
        btn.on('click', function() {
          var targetFolder = $("#folder-select").val();
          var files = window.skinFolders[targetFolder];

          if (!files) return;

          // モデル内の全メッシュを走査
          model.traverse(function(node) {
            if (node.isMesh && node.material) {
              var mats = Array.isArray(node.material) ? node.material : [node.material];
              mats.forEach(function(mat) {
                // マテリアル名の一部（例: EXT_CarPaint -> car_paint.dds）で一致するか判定
                var matName = mat.name.toLowerCase().replace("ext_", "").replace("int_", "");
                
                Object.keys(files).forEach(function(fileName) {
                  // デバッグ用：何と何を比較しているか表示
                  console.log("Checking Match:", matName, "vs", fileName.replace(".dds", ""));
                  
                  // 名前の一致判定（より緩やかに判定します）
                  if (matName.includes(fileName.replace(".dds", "").toLowerCase()) || fileName.replace(".dds", "").toLowerCase().includes(matName)) {
                    console.log(">>> MATCH! Applying", fileName, "to", mat.name);
                    console.log("読み込み試行:", fileName, "->", mat.name);
                    var loader = new THREE.DDSLoader();
                    loader.load(URL.createObjectURL(files[fileName]), function(texture) {
                    	texture.wrapS = THREE.ClampToEdgeWrapping;
                    	texture.wrapT = THREE.ClampToEdgeWrapping;
                    	texture.minFilter = THREE.LinearFilter;
                    	texture.magFilter = THREE.LinearFilter;
                    	texture.generateMipmaps = false;
                      
                      mat.map = texture;
                      mat.needsUpdate = true;
                    });
                  }
                });
              });
            }
          });
          alert(targetFolder + " を適用しました");
        });
        ui.append(btn);

        var exportBtn = $('<button>FBXエクスポート</button>');
        exportBtn.on('click', function() {
          if (!model) return;
          var exporter = new THREE.FBXExporter();
          var fbxData = exporter.parse(model);
          var blob = new Blob([fbxData], {type: 'application/octet-stream'});
          var link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          link.download = 'model.fbx';
          link.click();
        });
        ui.append(exportBtn);
      }
		});
	</script>
</head>
<body>
<div id="info">自作 KN5 ローカルビューア (Three.js r73ベース)</div>
<div id="msg">
	<div id="file-selector">
		<label for="kn5-file">▼ KN5フォルダを選択</label><br>
		<input type="file" id="kn5-file" webkitdirectory directory>
	</div>
	<div id="ui-container"></div>
	<textarea id="status-message" disabled="disabled"></textarea>
</div>
<div id="loading-state">
	<p class="status"></p>
	<div class="progressbar"><span class="bar"></span><span class="percentage"></span></div>
</div>

</body>
</html>
