<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<title>INI & LUT Analysis Debugger</title>
	<style>
		body { background: #1a1a1a; color: #eee; font-family: monospace; padding: 20px; }
		h1 { color: #4dabf7; border-bottom: 2px solid #4dabf7; }
		.upload-box { background: #2c2e33; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
		.result-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
		.result-table th, .result-table td { border: 1px solid #444; padding: 10px; text-align: left; }
		.result-table th { background: #343a40; }
		/* 特殊文字の可視化スタイル */
		.tab-mark { color: #ff6b6b; font-weight: bold; background: #3d1b1b; padding: 0 2px; border-radius: 2px; }
		.space-mark { color: #51cf66; opacity: 0.5; }
		.comment-mark { color: #868e96; font-style: italic; }
		.error-highlight { background: #c92a2a; color: white; padding: 2px 4px; border-radius: 3px; }
		pre { background: #000; padding: 10px; overflow-x: auto; font-size: 12px; }
	</style>
</head>
<body>

	<h1>INI & LUT Analysis Debugger</h1>
	
	<div id="drop-zone" style="
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(77, 171, 247, 0.2); border: 4px dashed #4dabf7;
    display: none; align-items: center; justify-content: center;
    z-index: 9999; pointer-events: none;">
    <h2 style="color: #4dabf7; background: #1a1a1a; padding: 20px; border-radius: 10px;">
        ファイルをここにドロップして解析
    </h2>
</div>
	<div class="settings-box" style="background: #2c2e33; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
		<h2 style="margin-top: 0; color: #fcc419;">⚙️ 設定の保存テスト</h2>
		<label for="setting-author">デフォルトの作者名 (Author): </label>
		<input type="text" id="setting-author" placeholder="例: Kunos" style="padding: 5px; background: #1a1a1a; color: #eee; border: 1px solid #444;">
		
		<button id="save-settings-btn" style="padding: 5px 15px; cursor: pointer; margin-left: 10px;">設定を保存</button>
		<button id="load-settings-btn" style="padding: 5px 15px; cursor: pointer; margin-left: 5px;">読み込む</button>
		
		<span id="settings-status" style="margin-left: 15px; font-weight: bold;"></span>
	</div>

	<div id="output-area">
		<p>ファイルを読み込むと、ここに解析結果が表示されます。</p>
	</div>
<script src="js/storage.js"></script>
<script src="js/parser.js"></script>
<script src="js/main.js"></script>
</body>
</html>
